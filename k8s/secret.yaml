# Template only — do not commit real values.
# Deliberately NOT listed in kustomization.yaml's resources: ArgoCD's selfHeal
# would otherwise overwrite a real secret applied out-of-band back to these
# placeholders on every sync. Apply the real one directly with kubectl instead.
# Populate this for real use with:
#   kubectl create secret generic app-secrets \
#     --namespace ai-task-platform \
#     --from-literal=JWT_SECRET=<random-string> \
#     --from-literal=MONGO_ROOT_USERNAME=<user> \
#     --from-literal=MONGO_ROOT_PASSWORD=<password> \
#     --from-literal=MONGO_URI=mongodb://<user>:<password>@mongo:27017/ai_task_platform?authSource=admin \
#     --dry-run=client -o yaml > secret.yaml
# and let that generated file (with real values, out of git) be applied instead of this one.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ai-task-platform
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME"
  MONGO_ROOT_USERNAME: "REPLACE_ME"
  MONGO_ROOT_PASSWORD: "REPLACE_ME"
  MONGO_URI: "mongodb://REPLACE_ME:REPLACE_ME@mongo:27017/ai_task_platform?authSource=admin"
