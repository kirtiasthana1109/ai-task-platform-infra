apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-task-platform
  namespace: ai-task-platform
spec:
  ingressClassName: nginx
  rules:
    - host: ai-task-platform.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
